name: remote_flutter
description: LAN Media Wall — Flutter 遥控端 (controller)。连 broker，看设备墙，下发播放控制。
publish_to: "none"
# v1.18.2+1182: safe remote configuration protocol — config revision/snapshots,
# structured results across Broker/P2P, and isolated transport/key operations.
# Rule: major*1000 + minor*10 + patch. Single-sourced here.
version: 1.18.2+1182

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  crypto: ^3.0.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  # 本地媒体上传（§20 A+B）：选手机相册/文件里的图片视频。file_picker 5.x 兼容
  # 本工程 SDK 下限（Dart >=3.0 / Flutter >=3.10）；6.x+ 需更高 SDK。
  file_picker: ^5.5.0
  # 真·摄像头扫码（§15 三层入口之「扫码」）。3.5.x 是兼容本工程 SDK 下限
  # (Dart >=3.0 / Flutter >=3.10) 的最后一条线；4.x/5.x/6.x 需 Flutter 3.19+/
  # Dart 3.3+，会顶穿上面的 environment 约束。要求 Android minSdkVersion 21
  # ——由 CI 在 `flutter create` 生成 android/ 后注入（见 flutter-build.yml）。
  mobile_scanner: 3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
