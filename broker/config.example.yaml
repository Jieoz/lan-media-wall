# LAN Media Wall broker — example config.
# Copy to config.yaml and edit. The PSK may also come from the LMW_PSK env var
# (env wins over this file). PSK must be the SAME 32+ byte random string on
# every player and controller (protocol_spec.md §3) — but is only REQUIRED when
# auth_mode is `required` (see below).

# §13 auth_mode: open (default) | optional | required.
#   open     — zero-config; broker does NOT verify sigs and sends sig:"".
#              No PSK needed. Trusted home/exhibition LANs.
#   optional — verify only when a frame carries a non-empty sig; migration mode.
#   required — strict HMAC verify + auth-fail cooldown; a PSK is mandatory.
# Override with the LMW_AUTH_MODE env var (env wins over this file).
auth_mode: open

# §17 key_mode: derived (default) | global. Controls which HMAC key signs/verifies
# frames when signing is active (auth_mode optional/required). It is moot under
# auth_mode=open (nothing is signed).
#   derived — per-endpoint device_key = HMAC(PSK, identity). A leaked player key
#             can forge only that player, not the whole system. Pairing QRs carry
#             each endpoint's `dk` (not the PSK); deployment config is unchanged —
#             you still set ONE psk below, the broker derives per-device on the fly.
#   global  — use the raw PSK as the HMAC key (v1.2 behaviour). Use this only to
#             interop with endpoints that haven't been upgraded to v1.3.
# Endpoints that receive a welcome/announce with key_mode MISSING treat it as
# `global` (backward compat, §17.3). Override with the LMW_KEY_MODE env var.
key_mode: derived

# §14 topology this broker advertises (diagnostic only): dedicated | cohosted.
#   dedicated — standalone broker process/container (default, 30-screen deploy).
#   cohosted  — broker embedded in a player process (run via broker.run_broker).
# Override with LMW_TOPOLOGY. p2p is NOT a broker mode (it has no broker).
topology: dedicated

# Pre-shared key for HMAC signing. Required only in auth_mode=required.
# Generate with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
psk: "CHANGE_ME_to_a_32plus_byte_random_hex_string"

# WebSocket ports.
ws_port: 8770
wss_port: 8771          # used only when certs/cert.pem + certs/key.pem exist
discovery_port: 8772    # UDP discover/announce

# §20.1 media library (local-upload mode B). The broker exposes a small HTTP
# endpoint so controllers can upload local files, which players then fetch over
# the normal cache_prefetch path. Set media_port: 0 to disable the endpoint.
media_port: 8773
media_bind_host: "0.0.0.0"        # set to 127.0.0.1 when fronted by a reverse proxy
media_upload_token: ""            # optional Bearer token required for PUT/POST uploads
media_dir: "media"                 # where uploaded files are stored (by sha256)
media_max_bytes: 524288000         # 500 MB per-file upload cap (413 over this)

# §21.2 prefetch barrier: when a prepare is flagged prefetch:true, wait this long
# for ALL group members to finish caching + report ready before starting whoever
# is ready. Distinct from (and much longer than) ready_timeout_ms below.
prefetch_barrier_timeout_ms: 120000

# Where the device registry is persisted.
state_path: "state.json"
certs_dir: "certs"

# Synchronized-start tuning (protocol_spec.md §8.2 / §9).
buffer_ms: 1500         # play_at = server_now + buffer_ms after ready collected
ready_timeout_ms: 2000  # collect ready up to this long, then fire for ready set

# Throttling / housekeeping.
wall_interval_ms: 1000      # max wall-snapshot push rate to controllers
time_sync_interval_ms: 30000

# Auth abuse protection (§3).
auth_fail_limit: 5
auth_cooldown_s: 60

# UDP discovery: the broker self-announces (topology/auth_mode/broker_hint) so
# endpoints auto-find it (§7/§14.5), and answers discover packets. On by default.
enable_discovery: true
announce_interval_ms: 5000   # how often to self-announce (0 disables)

# LAN IP advertised in announce + the pairing QR. Empty -> auto-detect.
advertise_host: ""
