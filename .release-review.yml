python_dirs: [broker, windows_player]
pytest_suites:
  - [broker/tests]
  - [windows_player/tests]
  - [broker/tests, windows_player/tests]
kotlin_src: android_apps/player/app/src/main/kotlin
android_res: android_apps/player/app/src/main/res
required_wired:
  - {symbol: showImage, defined_in: "**/PlayerController.kt", called_in: "**/PlayerService.kt"}
  - {symbol: onVideoEnded, defined_in: "**/PlayerController.kt", called_in: "**/PlayerService.kt"}
  - {symbol: attachImageView, defined_in: "**/PlayerController.kt", called_in: "**/MainActivity.kt"}
dart_dirs: [remote_flutter]
contract_keys:
  - {key: key_mode, files: ["broker/broker.py", "windows_player/main.py"]}
  - {key: download_logs, files: ["protocol_spec.md", "broker/broker.py", "windows_player/main.py", "remote_flutter/lib/p2p/p2p_coordinator.dart", "remote_flutter/lib/state/wall_state.dart", "android_apps/player/app/src/main/kotlin/com/jieoz/lanmediawall/player/PlayerService.kt"]}
  - {key: download_logs_result, files: ["protocol_spec.md", "broker/broker.py", "windows_player/main.py", "remote_flutter/lib/p2p/p2p_coordinator.dart", "android_apps/player/app/src/main/kotlin/com/jieoz/lanmediawall/player/PlayerService.kt"]}
  - {key: debug_snapshot, files: ["protocol_spec.md", "broker/broker.py", "windows_player/main.py", "remote_flutter/lib/state/wall_state.dart", "android_apps/player/app/src/main/kotlin/com/jieoz/lanmediawall/player/PlayerService.kt"]}
  - {key: diagnostic_status, files: ["protocol_spec.md", "broker/broker.py", "windows_player/main.py", "remote_flutter/lib/p2p/p2p_coordinator.dart", "android_apps/player/app/src/main/kotlin/com/jieoz/lanmediawall/player/PlayerService.kt"]}
  - {key: update_status, files: ["protocol_spec.md", "broker/broker.py", "remote_flutter/lib/net/broker_client.dart", "remote_flutter/lib/p2p/p2p_coordinator.dart", "android_apps/player/app/src/main/kotlin/com/jieoz/lanmediawall/player/PlayerService.kt"]}
  - {key: update_state, files: ["protocol_spec.md", "broker/broker.py", "remote_flutter/lib/protocol/messages.dart"]}
  - {key: update_detail, files: ["protocol_spec.md", "broker/broker.py", "remote_flutter/lib/protocol/messages.dart"]}
  - {key: update_version_code, files: ["protocol_spec.md", "broker/broker.py", "remote_flutter/lib/protocol/messages.dart"]}
