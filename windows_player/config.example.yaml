# LAN Media Wall — Windows player config (copy to config.yaml).
# Secrets: prefer the env var LMW_PSK over putting the PSK here. LMW_PSK wins.

broker:
  host: "192.168.1.10"     # broker (Synology Docker) LAN IP
  port: 8770               # WS  (protocol §1)
  use_wss: false           # set true if the broker has a cert
  wss_port: 8771

# Pre-shared key, 32+ random bytes, IDENTICAL on broker + every player (§3).
# Strongly prefer setting env LMW_PSK instead of committing this.
# §17 (v1.3): with derived key_mode you DON'T put a PSK here at all — scan the
# broker's pairing QR and this player stores only its own device_key (never the
# PSK). The derived_key fields below are filled by the QR; leave them blank.
psk: "CHANGE_ME_32_BYTE_RANDOM_PRESHARED_KEY"

# §17.3 key derivation mode. "global" = v1.2 (HMAC key = PSK, every end shares
# it). "derived" = v1.3 (each end signs with its own device_key = HMAC(PSK,id),
# so a leaked player can't forge other ends). The coordinator's declared
# key_mode (welcome/announce) wins at runtime — this is just the start value.
# Absent/unknown → global (backward compatible). env LMW_KEY_MODE overrides.
key_mode: "global"

# §17.4 per-device key material — populated by the pairing QR, NOT by hand.
# In derived mode the QR carries `dk` (this end's device_key) + `id` (identity)
# + `bk` (broker verify key); they land here. Users never touch this block.
derived_key:
  device_key: null         # hex; this player's own signing key (QR `dk`)
  identity: null           # our `from`, e.g. "player:win-lobby-01" (QR `id`)
  broker_key: null         # hex; key to verify broker frames (QR `bk`)

device:
  name: "大厅左屏"          # first-boot display name; persisted to state.json after
  group_id: "lobby"        # initial group; broker registry can reassign (§4/§9.3)

cache_dir: "C:/lmw/cache"   # where prefetched media lands (§6)
state_dir: "C:/lmw/state"   # device_id / device_name / last_task persistence

mpv:
  path: "mpv.exe"                    # ship mpv.exe next to the app (see README)
  ipc_pipe: "\\\\.\\pipe\\lmw-mpv"   # Windows named pipe for JSON IPC
  ipc_socket: "/tmp/lmw-mpv.sock"    # POSIX dev/CI fallback
  extra_args: []                     # any extra mpv flags

idle_image: null            # path to a placeholder image; null = pure black (§11)

thumbnail:
  enabled: true
  interval_s: 5             # ~5s per §6.4
  max_width: 320            # ≤320px wide JPEG
  jpeg_quality: 70
  always_collect: false     # true = ignore controller-presence gate (see NOTES)

discovery:
  enabled: true
  udp_port: 8772            # §7

status_interval_s: 1.5      # §5: every 1–2s
time_sync_interval_s: 30    # §8.1: re-handshake cadence

watchdog:
  check_interval_s: 1.0
  restart_grace_s: 5.0      # §11: restart within 5s on crash/hang
