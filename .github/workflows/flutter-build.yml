# Flutter controller — cloud build (Android APK for the remote_flutter app).
#
# Builds remote_flutter/ (Flutter, the controller UI) into an Android APK.
# The repo holds the portable Dart project (lib/, pubspec.yaml, test/) but not
# the generated platform folders. This workflow runs `flutter create` to
# materialize the android/ scaffold at build time. Release APK production is
# fail-closed: all keystore secrets plus the expected certificate fingerprint
# must be present, and the resulting signer is verified before upload.
name: flutter-build

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "remote_flutter/**"
      - ".github/workflows/flutter-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          cache: true

      - name: Pub get
        working-directory: remote_flutter
        run: flutter pub get

      - name: Analyze
        working-directory: remote_flutter
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        working-directory: remote_flutter
        run: flutter test

  build-apk:
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          cache: true

      # The repo carries the portable Dart project only. Generate the android/
      # platform scaffold in place without clobbering existing lib/ or pubspec.
      - name: Generate Android platform scaffold
        working-directory: remote_flutter
        shell: bash
        run: |
          if [ ! -d android ]; then
            echo "android/ not present — running flutter create to scaffold it."
            flutter create --platforms=android --project-name remote_flutter .
          else
            echo "android/ already present — skipping scaffold."
          fi

      # flutter create owns android/, but process-death restoration must be a
      # repository-owned invariant. Install the custom Activity at the exact
      # generated package path and verify the copy byte-for-byte.
      - name: Install non-restoring FlutterActivity
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="remote_flutter/android_template/MainActivity.kt"
          TARGET="remote_flutter/android/app/src/main/kotlin/com/example/remote_flutter/MainActivity.kt"
          test -f "$SOURCE"
          install -D -m 0644 "$SOURCE" "$TARGET"
          cmp --silent "$SOURCE" "$TARGET"

      # mobile_scanner needs CAMERA permission + minSdkVersion 21, and its
      # transitive CameraX 1.3.1 (androidx.camera:camera-core 等) requires
      # compileSdk >= 34. android/ is generated fresh above (not in the repo),
      # so none of these can live in a static manifest/gradle — inject them
      # here, idempotently. §15 扫码入口的落地依赖。
      - name: Inject camera permission + minSdk + compileSdk for mobile_scanner
        working-directory: remote_flutter
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # CAMERA 权限：仅在缺失时插到 <manifest> 开标签之后（幂等）。
          if ! grep -q 'android.permission.CAMERA' "$MANIFEST"; then
            sed -i 's#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name="android.permission.CAMERA" />#' "$MANIFEST"
            echo "injected CAMERA permission"
          else
            echo "CAMERA permission already present"
          fi
          # 局域网发现 + 本机媒体服务（§20 模式 A / §7 UDP 发现）所需权限（幂等）。
          # INTERNET 通常已由 flutter 脚手架加入；CHANGE_WIFI_MULTICAST_STATE 让
          # WiFi 下不过滤广播/组播，ACCESS_NETWORK_STATE 供网卡枚举。
          for PERM in \
            "android.permission.INTERNET" \
            "android.permission.CHANGE_WIFI_MULTICAST_STATE" \
            "android.permission.ACCESS_NETWORK_STATE"; do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "s#\(<manifest[^>]*>\)#\1\n    <uses-permission android:name=\"$PERM\" />#" "$MANIFEST"
              echo "injected $PERM"
            else
              echo "$PERM already present"
            fi
          done
          # 应用名（§3）：`flutter create --project-name remote_flutter` 生成的
          # android:label 就是 "remote_flutter"，装到手机上显示这个内部名。改包名
          # 会波及 Dart import，副作用大；这里只把 <application android:label> 改成
          # 正式中文名（幂等：把任何现值替换成目标值）。只动 android/ 脚手架，不碰
          # pubspec name / Dart 代码。
          APP_LABEL="媒体墙遥控"
          if grep -q 'android:label=' "$MANIFEST"; then
            sed -i "s#android:label=\"[^\"]*\"#android:label=\"$APP_LABEL\"#" "$MANIFEST"
            echo "set android:label -> $APP_LABEL"
          else
            sed -i "s#\(<application\)#\1 android:label=\"$APP_LABEL\"#" "$MANIFEST"
            echo "injected android:label -> $APP_LABEL"
          fi
          echo "--- android:label / <application> after patch ---"
          grep -nE 'android:label|<application' "$MANIFEST" || true
          # minSdkVersion 21：Flutter 新脚手架用 build.gradle(.kts) 里的
          # `minSdk = flutter.minSdkVersion` 占位；mobile_scanner 3.5 要求 21。
          # compileSdk  36：CameraX 1.3.1（mobile_scanner 传递依赖）的 AAR
          # metadata 要求 compileSdk >= 34，脚手架默认的 flutter.compileSdkVersion
          # 在旧 Flutter runner 上可能仍解析成 33，导致
          # `:mobile_scanner:checkReleaseAarMetadata` 失败。这里统一覆盖为字面量
          # 35（>=34），兼容 Groovy/KTS 两种写法，并打印 patch 后的行用于日志核对。
          for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
            [ -f "$GRADLE" ] || continue
            # --- minSdk -> 21（幂等：已是 21 就跳过覆盖） ---
            if grep -Eq 'minSdk(Version)?\s*[= ]\s*21' "$GRADLE"; then
              echo "$GRADLE already minSdk 21"
            else
              # Groovy: `minSdkVersion flutter.minSdkVersion` / `minSdk flutter.minSdkVersion`
              sed -i -E 's#(minSdk(Version)?)[[:space:]]+flutter\.minSdkVersion#\1 21#' "$GRADLE"
              # KTS: `minSdk = flutter.minSdkVersion`
              sed -i -E 's#(minSdk[[:space:]]*=[[:space:]]*)flutter\.minSdkVersion#\121#' "$GRADLE"
              echo "patched $GRADLE minSdk -> 21"
            fi
            # --- compileSdk -> 34（幂等：已 >=34 的字面量就跳过覆盖） ---
            if grep -Eq 'compileSdk(Version)?\s*[= ]\s*(3[4-9]|[4-9][0-9])' "$GRADLE"; then
              echo "$GRADLE already compileSdk >= 34"
            else
              # Groovy: `compileSdkVersion flutter.compileSdkVersion` / `compileSdk flutter.compileSdkVersion`
              sed -i -E 's#(compileSdk(Version)?)[[:space:]]+flutter\.compileSdkVersion#\1 34#' "$GRADLE"
              # Groovy 旧写法可能是字面量 `compileSdkVersion 33` / `compileSdk 33`
              sed -i -E 's#(compileSdk(Version)?)[[:space:]]+[0-9]+#\1 34#' "$GRADLE"
              # KTS: `compileSdk = flutter.compileSdkVersion` 或 `compileSdk = 33`
              sed -i -E 's#(compileSdk[[:space:]]*=[[:space:]]*)flutter\.compileSdkVersion#\134#' "$GRADLE"
              sed -i -E 's#(compileSdk[[:space:]]*=[[:space:]]*)[0-9]+#\134#' "$GRADLE"
              echo "patched $GRADLE compileSdk -> 34"
            fi
            echo "--- $GRADLE minSdk/compileSdk after patch ---"
            grep -nE 'minSdk|compileSdk' "$GRADLE" || true
          done

      # Wire a fixed RELEASE signingConfig into the freshly-scaffolded Gradle so
      # the controller APK is signed with the SAME keystore every build. Root
      # fix for the "signature mismatch on 11.1->11.2 upgrade" bug: `flutter
      # create` generates a build.gradle whose release buildType uses
      # `signingConfigs.debug`, and the GitHub runner regenerates its debug
      # keystore every run -> every version got a DIFFERENT cert -> Android
      # rejected in-place overwrite-updates. This injects a release signingConfig
      # that reads android/key.properties (written from Secrets below). The
      # release lane requires those credentials and never falls back to a debug key.
      - name: Inject release signingConfig into generated Gradle
        working-directory: remote_flutter
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import io, os, re, sys

          def patch_groovy(path):
              src = io.open(path, encoding="utf-8").read()
              if "LMW_RELEASE_SIGNING" in src:
                  print(path, "already patched"); return True
              props = (
                  "// LMW_RELEASE_SIGNING — load fixed keystore creds (written from CI Secrets)\n"
                  "def lmwKeystoreFile = rootProject.file('key.properties')\n"
                  "def lmwKeystoreProps = new Properties()\n"
                  "if (lmwKeystoreFile.exists()) { lmwKeystoreProps.load(new FileInputStream(lmwKeystoreFile)) }\n\n"
              )
              m = re.search(r'(?m)^android\s*\{', src)
              if not m:
                  print(path, "NO android{ block", file=sys.stderr); return False
              src = src[:m.start()] + props + src[m.start():]
              m = re.search(r'(?m)^android\s*\{', src)
              signing = (
                  "\n    signingConfigs {\n"
                  "        release {\n"
                  "            if (lmwKeystoreFile.exists()) {\n"
                  "                storeFile file(lmwKeystoreProps['storeFile'])\n"
                  "                storePassword lmwKeystoreProps['storePassword']\n"
                  "                keyAlias lmwKeystoreProps['keyAlias']\n"
                  "                keyPassword lmwKeystoreProps['keyPassword']\n"
                  "            }\n"
                  "        }\n"
                  "    }\n"
              )
              src = src[:m.end()] + signing + src[m.end():]
              new = ("signingConfig = lmwKeystoreFile.exists() ? "
                     "signingConfigs.release : signingConfigs.debug")
              src2 = re.sub(r'signingConfig\s*=?\s*signingConfigs\.debug', new, src)
              if src2 == src:
                  print(path, "WARN: release buildType 'signingConfig signingConfigs.debug' not found; "
                        "release may not pick up the config", file=sys.stderr)
              io.open(path, "w", encoding="utf-8").write(src2)
              print(path, "patched (groovy)"); return True

          def patch_kts(path):
              src = io.open(path, encoding="utf-8").read()
              if "LMW_RELEASE_SIGNING" in src:
                  print(path, "already patched"); return True
              if "import java.util.Properties" not in src:
                  src = "import java.util.Properties\nimport java.io.FileInputStream\n" + src
              props = (
                  "// LMW_RELEASE_SIGNING\n"
                  "val lmwKeystoreFile = rootProject.file(\"key.properties\")\n"
                  "val lmwKeystoreProps = Properties()\n"
                  "if (lmwKeystoreFile.exists()) { lmwKeystoreProps.load(FileInputStream(lmwKeystoreFile)) }\n\n"
              )
              m = re.search(r'(?m)^android\s*\{', src)
              if not m:
                  print(path, "NO android{ block", file=sys.stderr); return False
              src = src[:m.start()] + props + src[m.start():]
              m = re.search(r'(?m)^android\s*\{', src)
              signing = (
                  "\n    signingConfigs {\n"
                  "        create(\"release\") {\n"
                  "            if (lmwKeystoreFile.exists()) {\n"
                  "                storeFile = file(lmwKeystoreProps[\"storeFile\"] as String)\n"
                  "                storePassword = lmwKeystoreProps[\"storePassword\"] as String\n"
                  "                keyAlias = lmwKeystoreProps[\"keyAlias\"] as String\n"
                  "                keyPassword = lmwKeystoreProps[\"keyPassword\"] as String\n"
                  "            }\n"
                  "        }\n"
                  "    }\n"
              )
              src = src[:m.end()] + signing + src[m.end():]
              new = ('signingConfig = if (lmwKeystoreFile.exists()) '
                     'signingConfigs.getByName("release") else signingConfigs.getByName("debug")')
              src2 = re.sub(r'signingConfig\s*=\s*signingConfigs\.getByName\("debug"\)', new, src)
              if src2 == src:
                  print(path, "WARN: release buildType debug signingConfig not found", file=sys.stderr)
              io.open(path, "w", encoding="utf-8").write(src2)
              print(path, "patched (kts)"); return True

          done = False
          if os.path.exists("android/app/build.gradle"):
              done = patch_groovy("android/app/build.gradle") or done
          if os.path.exists("android/app/build.gradle.kts"):
              done = patch_kts("android/app/build.gradle.kts") or done
          if not done:
              print("ERROR: no android/app/build.gradle[.kts] to patch", file=sys.stderr)
              sys.exit(1)
          PY
          echo "--- signingConfig-related lines after patch ---"
          grep -nE 'signingConfig|LMW_RELEASE_SIGNING|lmwKeystore' android/app/build.gradle android/app/build.gradle.kts 2>/dev/null || true

      - name: Pub get
        working-directory: remote_flutter
        run: flutter pub get

      # Single source of truth for the version: pubspec.yaml (`version: X.Y.Z+N`).
      # Parsed here so the APK's internal versionName/versionCode ALWAYS match the
      # tag — no hardcoded number to drift (root fix for the v1.8/1.9/1.10 drift).
      - name: Derive version from pubspec
        id: ver
        working-directory: remote_flutter
        shell: bash
        run: |
          RAW=$(grep -E '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//')
          NAME=${RAW%%+*}
          CODE=${RAW##*+}
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "::notice::controller version_name=$NAME version_code=$CODE (from pubspec)"

      # Decode the FIXED release keystore from Secrets and write key.properties
      # so the injected signingConfig signs with a stable cert. Reuses the SAME
      # four Secrets as the player workflow (repo-level, shared across workflows)
      # so controller + player share one signing identity. Missing credentials or
      # expected fingerprint fail the release lane before any APK is published.
      - name: Prepare required release signing
        id: keystore
        working-directory: remote_flutter
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPECTED_ANDROID_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD EXPECTED_ANDROID_CERT_SHA256; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required release signing secret or certificate: $name"
              exit 1
            fi
          done
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          test -s "$RUNNER_TEMP/release.keystore"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      # One build path: the injected signingConfig signs with the fixed cert when
      # key.properties exists, else debug-signs. No silent fallback — if a
      # keystore IS present and signing fails, the build fails loudly.
      - name: Build release APKs (split per ABI)
        working-directory: remote_flutter
        run: flutter build apk --release --split-per-abi --build-name=${{ steps.ver.outputs.name }} --build-number=${{ steps.ver.outputs.code }}

      # Verify the signing identity so a silent debug-fallback can never ship
      # again. When a keystore was provided, assert the APK is NOT signed by the
      # Android debug cert (CN=Android Debug); fail the build if it is.
      - name: Verify APK signing identity
        working-directory: remote_flutter
        shell: bash
        env:
          EXPECTED_ANDROID_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          BT=$(ls "$ANDROID_HOME"/build-tools/ | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BT/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner executable not found: $APKSIGNER"
            exit 1
          fi
          EXPECTED=$(printf '%s' "$EXPECTED_ANDROID_CERT_SHA256" | tr -cd '[:xdigit:]' | tr '[:lower:]' '[:upper:]')
          test "${#EXPECTED}" -eq 64
          for APK in build/app/outputs/flutter-apk/*-release.apk; do
            "$APKSIGNER" verify --print-certs "$APK" > signer.txt
            ACTUAL=$(sed -n 's/.*certificate SHA-256 digest: //p' signer.txt | head -1 | tr -cd '[:xdigit:]' | tr '[:lower:]' '[:upper:]')
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "::error::$APK signer mismatch"
              exit 1
            fi
          done

      - name: Upload release APKs
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-controller-android-release
          path: remote_flutter/build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error
