# Android player — cloud build (Gradle wrapper, installable release APK).
#
# Builds android_apps/player/ (Kotlin, Gradle wrapper) into a RELEASE APK.
# Release signing (§根因B): when the ANDROID_KEYSTORE_* Secrets are present the
# release buildType signs with a FIXED production certificate (constant SHA256
# across versions → 覆盖升级 / 远程 update_app §23 works). The expected fingerprint
# is resolved from the checked-in canonical file (scripts/resolve_release_cert.sh,
# optional ANDROID_RELEASE_CERT_SHA256 override). Release builds fail closed when
# any signing Secret is absent or the expected fingerprint cannot be resolved.
#
# NOTE: android_apps/player/ Gradle wrapper is now committed. Its absence is
# treated as a real regression — the "Detect Gradle project" step FAILS CLOSED
# (::error:: + exit 1) rather than green-skipping the APK/QZX artifacts. (An
# earlier warn-and-continue guard is why the v1.0.0 release shipped without a
# player APK — gradlew was not committed at that tag. gradlew is committed now,
# so the release APK builds and attaches, and a future wrapper regression fails
# the run instead of silently shipping nothing.)
name: android-build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # --- Standalone Windows OTA detector EXE ---------------------------------
  # A field operator must double-click OTA检测.bat on a stock Windows x64 box
  # with NO Python installed. That requires a REAL PE executable, so we build
  # it on a Windows runner with a PINNED PyInstaller and hand it to the Ubuntu
  # `build` job below via an intra-run artifact (no tag-time rebuild, no
  # cross-workflow dependency cycle). android_ota_diag.py is pure-stdlib, so
  # this is a fast --onefile bundle with no third-party deps.
  ota-detector:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.11.1"

      - name: Build standalone android_ota_diag.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          pyinstaller --onefile --console --name android_ota_diag scripts/android_ota_diag.py
          if (-not (Test-Path "dist/android_ota_diag.exe")) {
            throw "PyInstaller did not produce dist/android_ota_diag.exe"
          }

      - name: Prove it is a real PE and runs with NO Python
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "dist/android_ota_diag.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe)[0..1]
          if ($bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw "$exe is not a PE executable (missing 'MZ' header)"
          }
          # Run against a synthetic bundle with the interpreter removed from PATH
          # so a hidden dependency on system Python would fail here.
          New-Item -ItemType Directory -Force -Path probe | Out-Null
          "Success" | Out-File -Encoding utf8 probe/pm.txt
          $env:PATH = "$env:SystemRoot;$env:SystemRoot\System32"
          & $exe --profile scripts/android_ota_profiles/qzx-yunos-4.4.json --human analyze probe | Tee-Object -Variable out
          if ($LASTEXITCODE -ne 0) { throw "detector exe exited $LASTEXITCODE" }
          # Tee-Object captures stdout as an ARRAY of lines. `$array -notmatch re`
          # returns the FILTERED array (all non-matching lines), which is truthy
          # whenever any single line lacks the pattern — so testing the array
          # directly would throw on every run. Join to ONE string first so
          # -notmatch yields a real boolean over the whole report.
          $joined = $out | Out-String
          if ($joined -notmatch "无法证明|不确定") {
            throw "human report failed the lone-Success honesty contract"
          }

      - name: Upload OTA detector EXE
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-ota-detector
          path: dist/android_ota_diag.exe
          if-no-files-found: error

  build:
    # `needs` orders build after the Windows detector and lets build consume its
    # EXE artifact. GitHub otherwise applies an implicit `success()` check to a
    # job with `needs`, so `always() && !cancelled()` is required for the APK
    # lane to run even when the detector FAILS — a Windows/PyInstaller outage
    # must not wash out the Android APK build/test/upload. The QZX-ZIP steps below re-gate on
    # `needs.ota-detector.result == 'success'` so the ZIP stays fail-closed, and
    # because a failed `needs` still surfaces in the run's overall conclusion the
    # whole workflow stays RED (promotion, which requires a successful run,
    # cannot then pick up a missing/stale QZX package).
    needs: ota-detector
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Gradle wrapper is committed (§ header note), so its absence is a
      # real regression — a vanished/omitted wrapper, or a tag cut before it
      # landed. Fail CLOSED: emit an error and exit nonzero rather than the old
      # `present=false` warn-and-continue, which would green-skip every
      # APK/QZX artifact and let an empty run be promoted. The APK-lane steps
      # still gate on `steps.detect.outputs.present == 'true'` (set only on the
      # success path), so the gate contract downstream is unchanged.
      - name: Detect Gradle project
        id: detect
        shell: bash
        run: |
          if [ -f android_apps/player/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Gradle wrapper found."
          else
            echo "::error::android_apps/player/gradlew not found — the Android player Gradle wrapper must be committed; refusing to green-skip the APK/QZX build."
            exit 1
          fi

      - name: Set up JDK 17 (Temurin)
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: chmod +x android_apps/player/gradlew

      # Resolve the ONE expected signer fingerprint (§根因B) for this lane from
      # the checked-in canonical file (or the optional ANDROID_RELEASE_CERT_SHA256
      # override), and export it for the signing + verify steps. Fails closed if
      # no valid 64-hex-char fingerprint is resolvable.
      - name: Resolve expected release certificate fingerprint
        if: steps.detect.outputs.present == 'true'
        shell: bash
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ vars.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          EXPECTED_ANDROID_CERT_SHA256="$(bash scripts/resolve_release_cert.sh)"
          echo "EXPECTED_ANDROID_CERT_SHA256=$EXPECTED_ANDROID_CERT_SHA256" >> "$GITHUB_ENV"

      # --- Stable release signing (§根因B) ---------------------------------
      # Decode the fixed keystore from Secrets and write key.properties so the
      # release buildType signs with a CONSTANT certificate (same SHA256 across
      # versions). That is what makes 覆盖安装 / 远程 update_app (§23) work — a
      # per-build debug key changes fingerprint every version and forces
      # uninstall-reinstall (INSTALL_FAILED_UPDATE_INCOMPATIBLE). Runs only when
      # ALL keystore secrets are present AND the expected fingerprint resolved
      # above; otherwise the release lane fails closed rather than publishing a
      # debug-signed APK. key.properties + keystore live only in $RUNNER_TEMP /
      # the player root (git-ignored) — plaintext credentials never enter the repo.
      - name: Prepare required release keystore
        if: steps.detect.outputs.present == 'true'
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD EXPECTED_ANDROID_CERT_SHA256; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required release signing secret or certificate: $name"
              exit 1
            fi
          done
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          test -s "$RUNNER_TEMP/release.keystore"
          cat > android_apps/player/key.properties <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build API19-compatible daemon asset before APK
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          NDK_BIN="$(find "$ANDROID_HOME/ndk" -path '*/toolchains/llvm/prebuilt/linux-x86_64/bin' -type d | sort | tail -1)"
          test -n "$NDK_BIN"
          CC="$NDK_BIN/armv7a-linux-androideabi21-clang"
          "$CC" -Os -static -fno-PIE -Wall -Wextra -Werror -s \
            -o scripts/lmw_root_daemon scripts/lmw_root_daemon.c
          LLVM_READELF="$(find "$ANDROID_HOME/ndk" -name llvm-readelf -path '*/linux-x86_64/*' 2>/dev/null | sort | tail -1)"
          test -n "$LLVM_READELF"
          export PATH="$(dirname "$LLVM_READELF"):$PATH"
          bash scripts/check_daemon_elf.sh scripts/lmw_root_daemon
          mkdir -p android_apps/player/app/src/main/assets
          cp scripts/lmw_root_daemon android_apps/player/app/src/main/assets/lmw_root_daemon
          cmp scripts/lmw_root_daemon android_apps/player/app/src/main/assets/lmw_root_daemon

      - name: Run Android JVM unit tests
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build release APK
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon assembleRelease

      # Echo the signer certificate so the fixed SHA256 fingerprint is visible in
      # the CI log for real-device cross-check (§根因B verification).
      - name: Verify APK signer certificate
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          APK="$(ls android_apps/player/app/build/outputs/apk/release/*.apk | head -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f 2>/dev/null | sort -V | tail -1)"
          if [ -z "$APKSIGNER" ] || [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner executable not found"
            exit 1
          fi
          EXPECTED=$(printf '%s' "$EXPECTED_ANDROID_CERT_SHA256" | tr -cd '[:xdigit:]' | tr '[:lower:]' '[:upper:]')
          ACTUAL=$("$APKSIGNER" verify --print-certs "$APK" | sed -n 's/.*certificate SHA-256 digest: //p' | head -1 | tr -cd '[:xdigit:]' | tr '[:lower:]' '[:upper:]')
          test "${#EXPECTED}" -eq 64
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::$APK signer mismatch"
            exit 1
          fi

      - name: Test + build QZX root daemon (armv7, static)
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          # 1) Host unit tests for the daemon parser + security policy (gcc, x86_64).
          #    These lock the root-socket guardrails; a regression fails the build.
          gcc -DLMW_DAEMON_TEST -Wall -Wextra -Werror \
            -o /tmp/tdaemon scripts/tests/test_lmw_root_daemon.c
          /tmp/tdaemon
          # The simulator includes production transaction code with sandbox paths.
          # It has no daemon main/socket caller, so those helpers are intentionally unused.
          gcc -Wall -Wextra -Werror -Wno-unused-function \
            -o /tmp/android-ota-simulator scripts/tests/test_android_ota_simulator.c
          /tmp/android-ota-simulator
          # 1b) Host regression test for the ELF gate itself: prove it REJECTS a
          #     dynamic binary referencing signal() and ACCEPTS a static one
          #     (the v1.14.0 API19 "cannot locate symbol signal" field failure).
          bash scripts/tests/test_check_daemon_elf.sh
          # 2) Cross-compile the daemon for the box (armv7). It is started AS root
          #    by lmw_setup and stays root — NO setuid bit (ignored under zygote
          #    no_new_privs on these boxes); authorization is SO_PEERCRED only.
          #    FULLY STATIC + NON-PIE: the box is API19 bionic. A dynamic build
          #    resolves libc against the DEVICE bionic at exec time, and API19
          #    does not export some symbols modern NDK headers reference (signal)
          #    → the daemon never starts. Static carries its own libc → runs on
          #    API19..current with nothing to resolve. Non-PIE avoids the
          #    static-PIE loader path (unreliable on 4.4 kernels): on the NDK
          #    `-static` already yields a classic non-PIE ET_EXEC (static-PIE
          #    would need an explicit `-static-pie`), and `-fno-PIE` fixes the
          #    codegen to match. We do NOT pass `-no-pie`: with `-static` it is
          #    a link-only no-op that clang reports as "argument unused during
          #    compilation", which `-Werror` turns into a build failure. The
          #    ELF ship gate below is what actually proves the output is static.
          NDK_BIN="$(find "$ANDROID_HOME/ndk" -path '*/toolchains/llvm/prebuilt/linux-x86_64/bin' -type d | sort | tail -1)"
          if [ -z "$NDK_BIN" ]; then
            echo "Android NDK linux-x86_64 toolchain not found" >&2
            exit 1
          fi
          CC="$NDK_BIN/armv7a-linux-androideabi21-clang"
          "$CC" -Os -static -fno-PIE -Wall -Wextra -Werror -s \
            -o scripts/lmw_root_daemon scripts/lmw_root_daemon.c
          file scripts/lmw_root_daemon
          # 3) SHIP GATE: fail the build unless the produced armv7 binary is fully
          #    static (no PT_INTERP / DT_NEEDED) and free of API19-unsafe undefined
          #    dynamic symbols. Prefer the NDK's llvm-readelf for the arm binary.
          LLVM_READELF="$(find "$ANDROID_HOME/ndk" -name llvm-readelf -path '*/linux-x86_64/*' 2>/dev/null | sort | tail -1)"
          if [ -n "$LLVM_READELF" ]; then
            export PATH="$(dirname "$LLVM_READELF"):$PATH"
          fi
          bash scripts/check_daemon_elf.sh scripts/lmw_root_daemon
          chmod 755 scripts/lmw_root_daemon

      # Pull the standalone Windows OTA detector EXE built by the ota-detector
      # job in THIS run (never rebuilt at tag time).
      - name: Download standalone OTA detector EXE
        if: steps.detect.outputs.present == 'true' && needs.ota-detector.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: lan-media-wall-ota-detector
          path: ota_detector_exe

      - name: Package QZX updater tools
        if: steps.detect.outputs.present == 'true' && needs.ota-detector.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist_tools
          cp scripts/lmw_setup.bat scripts/lmw_setup.sh \
             scripts/lmw_fleet_bootstrap.bat scripts/devices.example.txt \
             scripts/lmw_restore.bat scripts/lmw_restore.sh \
             scripts/lmw_audit.bat scripts/lmw_audit.sh \
             scripts/qzx_field_check.bat scripts/qzx_field_check.sh \
             scripts/qzx_ab_backend.bat scripts/qzx_ab_backend.sh \
             scripts/qzx_verify_update.bat scripts/qzx_verify_update.sh \
             scripts/QZX-KIOSK-TOOLS.md scripts/lmw_root_daemon dist_tools/
          # Chinese double-click launcher at the ZIP root (UTF-8 BOM + CRLF).
          cp "scripts/OTA检测.bat" dist_tools/
          mkdir -p dist_tools/android_ota/profiles
          cp scripts/android_ota_diag.py dist_tools/android_ota/
          cp scripts/android_ota_profiles/*.json dist_tools/android_ota/profiles/
          # The real PE executable — no Python needed on the operator's box.
          test -s ota_detector_exe/android_ota_diag.exe
          cp ota_detector_exe/android_ota_diag.exe dist_tools/android_ota/
          (cd dist_tools && zip -9 ../LANMediaWall-QZX-Update-Tools.zip \
            lmw_setup.bat lmw_setup.sh \
            lmw_fleet_bootstrap.bat devices.example.txt \
            lmw_restore.bat lmw_restore.sh \
            lmw_audit.bat lmw_audit.sh \
            qzx_field_check.bat qzx_field_check.sh \
            qzx_ab_backend.bat qzx_ab_backend.sh \
            qzx_verify_update.bat qzx_verify_update.sh \
            QZX-KIOSK-TOOLS.md lmw_root_daemon \
            "OTA检测.bat" \
            android_ota/android_ota_diag.exe \
            android_ota/android_ota_diag.py \
            android_ota/profiles/standard-pm.json \
            android_ota/profiles/qzx-yunos-4.4.json)
          ls -la LANMediaWall-QZX-Update-Tools.zip

      - name: Verify QZX restart and package contracts
        if: steps.detect.outputs.present == 'true' && needs.ota-detector.result == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/tests/test_qzx_release_contract.py
          # Fail-closed structural gate: the Chinese launcher (BOM+CRLF, no
          # interpreter), the real PE detector EXE ('MZ'), the Python source,
          # and both profiles must all be present in the shipped ZIP.
          python3 scripts/qzx_bundle_contract.py LANMediaWall-QZX-Update-Tools.zip
          # Belt-and-braces: the legacy member list check stays too.
          python3 - <<'PY'
          import zipfile
          names=set(zipfile.ZipFile('LANMediaWall-QZX-Update-Tools.zip').namelist())
          required={
            'qzx_field_check.bat', 'qzx_field_check.sh', 'lmw_root_daemon',
            'lmw_fleet_bootstrap.bat', 'devices.example.txt',
            'OTA检测.bat',
            'android_ota/android_ota_diag.exe',
            'android_ota/android_ota_diag.py',
            'android_ota/profiles/standard-pm.json',
            'android_ota/profiles/qzx-yunos-4.4.json',
          }
          missing=required-names
          if missing: raise SystemExit(f'missing QZX release assets: {sorted(missing)}')
          print('QZX_ZIP_CONTENT_PASS', sorted(required))
          PY

      - name: Upload QZX updater tools
        if: steps.detect.outputs.present == 'true' && needs.ota-detector.result == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-qzx-update-tools
          path: LANMediaWall-QZX-Update-Tools.zip
          if-no-files-found: error

      - name: Upload release APK
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-android-release
          path: android_apps/player/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
