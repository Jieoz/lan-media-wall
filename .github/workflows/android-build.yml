# Android player — cloud build (Gradle wrapper, installable release APK).
#
# Builds android_apps/player/ (Kotlin, Gradle wrapper) into a RELEASE APK.
# Release signing (§根因B): when the ANDROID_KEYSTORE_* Secrets are present the
# release buildType signs with a FIXED production certificate (constant SHA256
# across versions → 覆盖升级 / 远程 update_app §23 works). With no secrets
# (fork PRs) app/build.gradle.kts gracefully falls back to debug signing so the
# APK is still installable for sideload and the lane stays green.
#
# NOTE: android_apps/player/ is produced by another track. If the Gradle wrapper
# is not present yet, the build steps no-op gracefully (guarded below) so this
# workflow does not fail before the project lands. (This guard is exactly why
# the v1.0.0 release shipped without a player APK — gradlew was not committed at
# that tag. It is now, so the release APK builds and attaches.)
name: android-build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether the Gradle project exists yet. Every later build step is
      # gated on this so the workflow stays green while the app is still landing.
      - name: Detect Gradle project
        id: detect
        shell: bash
        run: |
          if [ -f android_apps/player/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Gradle wrapper found."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::android_apps/player/gradlew not found — skipping Android build (project not generated yet)."
          fi

      - name: Set up JDK 17 (Temurin)
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: chmod +x android_apps/player/gradlew

      # --- Stable release signing (§根因B) ---------------------------------
      # Decode the fixed keystore from Secrets and write key.properties so the
      # release buildType signs with a CONSTANT certificate (same SHA256 across
      # versions). That is what makes 覆盖安装 / 远程 update_app (§23) work — a
      # per-build debug key changes fingerprint every version and forces
      # uninstall-reinstall (INSTALL_FAILED_UPDATE_INCOMPATIBLE). Runs only when
      # ALL secrets are present; otherwise build.gradle.kts falls back to debug
      # signing and the lane still passes (fork PRs, no-secret contexts).
      # key.properties + keystore live only in $RUNNER_TEMP / the player root
      # (git-ignored) — plaintext credentials never enter the repo.
      - name: Check for release keystore
        if: steps.detect.outputs.present == 'true'
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ANDROID_KEYSTORE_BASE64 secret — release APK will be debug-signed (installable, but no cross-version overwrite-update)."
          fi

      - name: Decode keystore and write key.properties
        if: steps.detect.outputs.present == 'true' && steps.keystore.outputs.have == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          cat > android_apps/player/key.properties <<EOF
          storeFile=$RUNNER_TEMP/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          echo "::notice::Release keystore decoded — release APK will be signed with the fixed production certificate."

      - name: Run Android JVM unit tests
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build release APK
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon assembleRelease

      # Echo the signer certificate so the fixed SHA256 fingerprint is visible in
      # the CI log for real-device cross-check (§根因B verification).
      - name: Verify APK signer certificate
        if: steps.detect.outputs.present == 'true' && steps.keystore.outputs.have == 'true'
        shell: bash
        run: |
          APK="$(ls android_apps/player/app/build/outputs/apk/release/*.apk | head -1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner 2>/dev/null | sort | tail -1)"
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --print-certs "$APK" | grep -i "SHA-256" || true
          else
            echo "::notice::apksigner not found; skipping fingerprint echo."
          fi

      - name: Build QZX root update helper
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          NDK_BIN="$(find "$ANDROID_HOME/ndk" -path '*/toolchains/llvm/prebuilt/linux-x86_64/bin' -type d | sort | tail -1)"
          if [ -z "$NDK_BIN" ]; then
            echo "Android NDK linux-x86_64 toolchain not found" >&2
            exit 1
          fi
          CC="$NDK_BIN/armv7a-linux-androideabi21-clang"
          "$CC" -Os -fPIE -Wall -Wextra -Werror \
            -o scripts/lmw_root_helper scripts/lmw_root_helper.c
          file scripts/lmw_root_helper
          chmod 755 scripts/lmw_root_helper

      - name: Package QZX updater tools
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: |
          mkdir -p dist_tools
          cp scripts/lmw_setup.bat scripts/lmw_setup.sh \
             scripts/lmw_restore.bat scripts/lmw_restore.sh \
             scripts/lmw_audit.bat scripts/lmw_audit.sh \
             scripts/QZX-KIOSK-TOOLS.md scripts/lmw_root_helper dist_tools/
          (cd dist_tools && zip -9 ../LANMediaWall-QZX-Update-Tools.zip \
            lmw_setup.bat lmw_setup.sh \
            lmw_restore.bat lmw_restore.sh \
            lmw_audit.bat lmw_audit.sh \
            QZX-KIOSK-TOOLS.md lmw_root_helper)
          ls -la LANMediaWall-QZX-Update-Tools.zip

      - name: Upload QZX updater tools
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-qzx-update-tools
          path: LANMediaWall-QZX-Update-Tools.zip
          if-no-files-found: error

      - name: Upload release APK
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-android-release
          path: android_apps/player/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
