# Android player — cloud build (Gradle wrapper, debug APK + optional signed release).
#
# Builds android_apps/player/ (Kotlin, Gradle wrapper) into an APK.
# Defaults to an unsigned debug APK. A signed release APK is produced ONLY when
# a keystore is provided via secrets; otherwise the release step is skipped
# cleanly and CI still succeeds with the debug artifact.
#
# NOTE: android_apps/player/ is produced by another track. If the Gradle wrapper
# is not present yet, the build steps no-op gracefully (guarded below) so this
# workflow does not fail before the project lands.
name: android-build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "android_apps/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write   # needed for the tag -> Release upload step

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether the Gradle project exists yet. Every later build step is
      # gated on this so the workflow stays green while the app is still landing.
      - name: Detect Gradle project
        id: detect
        shell: bash
        run: |
          if [ -f android_apps/player/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Gradle wrapper found."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::android_apps/player/gradlew not found — skipping Android build (project not generated yet)."
          fi

      - name: Set up JDK 17 (Temurin)
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: chmod +x android_apps/player/gradlew

      - name: Build debug APK
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-android-debug
          path: android_apps/player/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # --- Optional signed release APK -------------------------------------
      # Runs only when ALL keystore secrets are present. Decode the base64
      # keystore to a file and hand signing config to Gradle via -P properties.
      # The Gradle project's signingConfig is expected to read these properties
      # (RELEASE_STORE_FILE / RELEASE_STORE_PASSWORD / RELEASE_KEY_ALIAS /
      # RELEASE_KEY_PASSWORD). If it does not, release signing is a no-op and
      # only the debug APK ships — CI still passes.
      - name: Check for release keystore
        if: steps.detect.outputs.present == 'true'
        id: keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ANDROID_KEYSTORE_BASE64 secret — skipping signed release APK."
          fi

      - name: Decode keystore
        if: steps.detect.outputs.present == 'true' && steps.keystore.outputs.have == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "Keystore decoded to $RUNNER_TEMP/release.keystore"

      - name: Build release APK (signed)
        if: steps.detect.outputs.present == 'true' && steps.keystore.outputs.have == 'true'
        working-directory: android_apps/player
        shell: bash
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon assembleRelease \
            -PRELEASE_STORE_FILE="$RUNNER_TEMP/release.keystore" \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Upload release APK
        if: steps.detect.outputs.present == 'true' && steps.keystore.outputs.have == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-android-release
          path: android_apps/player/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      # --- Attach APKs to a GitHub Release on tag pushes (v*) --------------
      - name: Attach APKs to Release (tags only)
        if: steps.detect.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android_apps/player/app/build/outputs/apk/debug/*.apk
            android_apps/player/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
