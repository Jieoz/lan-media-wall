# Android player — cloud build (Gradle wrapper, installable release APK).
#
# Builds android_apps/player/ (Kotlin, Gradle wrapper) into a RELEASE APK.
# With no production keystore the release buildType is debug-signed (see
# app/build.gradle.kts) so the APK is still installable for sideload. A real
# keystore can later be wired via the project's signingConfig.
#
# NOTE: android_apps/player/ is produced by another track. If the Gradle wrapper
# is not present yet, the build steps no-op gracefully (guarded below) so this
# workflow does not fail before the project lands. (This guard is exactly why
# the v1.0.0 release shipped without a player APK — gradlew was not committed at
# that tag. It is now, so the release APK builds and attaches.)
name: android-build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "android_apps/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write   # needed for the tag -> Release upload step

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether the Gradle project exists yet. Every later build step is
      # gated on this so the workflow stays green while the app is still landing.
      - name: Detect Gradle project
        id: detect
        shell: bash
        run: |
          if [ -f android_apps/player/gradlew ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Gradle wrapper found."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::android_apps/player/gradlew not found — skipping Android build (project not generated yet)."
          fi

      - name: Set up JDK 17 (Temurin)
        if: steps.detect.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        if: steps.detect.outputs.present == 'true'
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        if: steps.detect.outputs.present == 'true'
        shell: bash
        run: chmod +x android_apps/player/gradlew

      - name: Build release APK (debug-signed, installable)
        if: steps.detect.outputs.present == 'true'
        working-directory: android_apps/player
        shell: bash
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload release APK
        if: steps.detect.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-android-release
          path: android_apps/player/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # --- Attach release APK to a GitHub Release on tag pushes (v*) --------
      # assembleRelease above is debug-signed (installable) by default; a real
      # keystore can be wired later via the project's signingConfig. The glob
      # matches the single app-release.apk Gradle emits. fail_on_unmatched_files
      # is true so a path regression fails the lane loudly instead of silently
      # shipping a release with no player APK (the v1.0.0 miss).
      - name: Attach release APK to Release (tags only)
        if: steps.detect.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android_apps/player/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
