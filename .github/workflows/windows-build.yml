# Windows player — cloud build (PyInstaller --onedir + UPX, wrapped by Inno
# Setup into an install wizard; bundles the mpv.exe runtime).
#
# Produces lan-media-wall-player-setup.exe: a self-contained install wizard that
# needs NO Python and NO separately-installed mpv on the target box. The mpv.exe
# runtime is bundled inside and made discoverable at runtime by a PyInstaller
# runtime hook (.github/pyinstaller/rthook_mpv.py).
#
# Slimming vs the old 60.6 MB --onefile build: UPX-compressed DLLs, dropped
# unused stdlib (tkinter/unittest/test/pydoc/lib2to3/...), and LZMA2/ultra
# installer compression. mpv.exe is a hard size floor and is explicitly NOT
# UPX-packed (that breaks it).
#
# Why mpv.exe (and not libmpv-2.dll): the player spawns a real mpv process over
# JSON IPC (windows_player/mpv_controller.py + watchdog.py). python-mpv/libmpv
# is explicitly optional and unused at runtime, so the thing we must ship is the
# mpv.exe binary, not the libmpv DLL.
name: windows-build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- Download a standalone mpv.exe Windows runtime --------------------
      # We DO NOT pin a single archive URL: the mpv-player-windows project on
      # SourceForge regularly garbage-collects old builds, so any hard-coded
      # version (e.g. an old mpv-x86_64-YYYYMMDD-git-*.7z) eventually 404s and
      # breaks this job. Instead we discover the newest build at run time, with
      # two independent sources so a single outage can't block the pipeline:
      #
      #   1. PRIMARY  — zhongfly/mpv-winbuild GitHub releases (a well-known
      #      mirror of the shinchiro mpv-x86_64 builds). releases/latest exposes
      #      a mpv-x86_64-*.7z asset whose browser_download_url is a direct,
      #      UA-agnostic file download. This is the most robust source on a CI
      #      runner: no interstitial HTML pages, no per-version GC.
      #   2. FALLBACK — SourceForge RSS for the /64bit folder; the first <link>
      #      matching mpv-x86_64-*.7z is the latest build. NOTE: SourceForge
      #      serves a browser interstitial (HTML, ~140 KB) to browser-like User-
      #      Agents and only returns the real .7z to a Wget-style UA, so the
      #      download below forces a Wget User-Agent.
      #
      # The only hard requirement is that the archive contains an mpv.exe.
      - name: Download mpv.exe runtime
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $dir = "mpv_runtime"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $archive = Join-Path $dir "mpv.7z"
          # Wget UA: SourceForge hands a Wget-style client the real binary
          # instead of the JavaScript "your download will start shortly" page.
          $ua = "Wget/1.21.4"

          function Resolve-FromGitHubMirror {
            $api = "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
            Write-Host "Querying GitHub mirror API: $api"
            $headers = @{ "User-Agent" = "lan-media-wall-ci"; "Accept" = "application/vnd.github+json" }
            if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "Bearer $($env:GITHUB_TOKEN)" }
            $rel = Invoke-RestMethod -Uri $api -Headers $headers -MaximumRedirection 10
            $asset = $rel.assets | Where-Object { $_.name -match '^mpv-x86_64-\d.*\.7z$' } | Select-Object -First 1
            if (-not $asset) { throw "no mpv-x86_64-*.7z asset in zhongfly/mpv-winbuild latest release" }
            return $asset.browser_download_url
          }

          function Resolve-FromSourceForge {
            $rss = "https://sourceforge.net/projects/mpv-player-windows/rss?path=/64bit"
            Write-Host "Querying SourceForge RSS: $rss"
            $resp = Invoke-WebRequest -Uri $rss -UseBasicParsing -MaximumRedirection 10 -UserAgent $ua
            $m = [regex]::Match($resp.Content, '<link>(https://sourceforge\.net/projects/mpv-player-windows/files/64bit/mpv-x86_64-[^<]*?\.7z/download)</link>')
            if (-not $m.Success) { throw "no mpv-x86_64-*.7z link found in SourceForge RSS" }
            return $m.Groups[1].Value
          }

          $url = $null
          try {
            $url = Resolve-FromGitHubMirror
            Write-Host "PRIMARY (GitHub mirror) resolved: $url"
          } catch {
            Write-Warning "PRIMARY source (GitHub mirror) failed: $($_.Exception.Message)"
            try {
              $url = Resolve-FromSourceForge
              Write-Host "FALLBACK (SourceForge) resolved: $url"
            } catch {
              throw "Both mpv download sources failed. GitHub mirror + SourceForge unreachable: $($_.Exception.Message)"
            }
          }

          Write-Host "Downloading mpv archive from $url"
          Invoke-WebRequest -Uri $url -OutFile $archive -MaximumRedirection 10 -UseBasicParsing -UserAgent $ua
          $size = (Get-Item $archive).Length
          if ($size -lt 1MB) { throw "downloaded archive is implausibly small ($size bytes) — likely an error page, not a 7z" }
          Write-Host "Downloaded $size bytes to $archive"

          # 7z ships with the windows-latest runner image (7z.exe on PATH).
          & 7z x $archive "-o$dir" -y | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "7z extraction failed with exit code $LASTEXITCODE" }
          $mpv = Get-ChildItem -Path $dir -Recurse -Filter "mpv.exe" | Select-Object -First 1
          if (-not $mpv) { throw "mpv.exe not found inside the downloaded archive" }
          $dest = Join-Path $dir "mpv.exe"
          # Some archives (e.g. the zhongfly mirror) extract mpv.exe straight
          # into $dir, so the discovered file may already be the destination —
          # Copy-Item -Force errors on "overwrite the item with itself".
          if ($mpv.FullName -ne (Resolve-Path -LiteralPath $dest -ErrorAction SilentlyContinue).Path) {
            Copy-Item $mpv.FullName -Destination $dest -Force
          }
          if (-not (Test-Path $dest)) { throw "mpv.exe missing at $dest after extraction" }
          Write-Host "mpv.exe ready at $dest"

      - name: Install Python deps + PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          # Windows runner installs pywin32/python-mpv fine (sys_platform markers).
          pip install -r windows_player/requirements.txt
          pip install pyinstaller

      # UPX shrinks the PyInstaller-bundled DLLs (Python runtime, deps) by a good
      # margin. Installed via the runner's bundled Chocolatey.
      - name: Install UPX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install upx -y --no-progress
          upx --version | Select-Object -First 1

      # --- Package into a --onedir bundle, slimmed ------------------------------
      # Changes vs the old 60.6 MB --onefile build:
      #   --onedir              : a folder bundle (exe + _internal\). We hand this
      #                           to Inno Setup, which LZMA-compresses it into one
      #                           install wizard exe — far smaller on disk than a
      #                           self-extracting onefile.
      #   --upx-dir             : UPX-compress the bundled DLLs.
      #   --upx-exclude mpv.exe : NEVER UPX the mpv runtime — UPX-packing mpv.exe
      #                           is known to break it / trip AV; it stays as-is.
      #   --exclude-module ...  : drop heavy stdlib the player never imports
      #                           (verified: no tkinter/unittest/test/pydoc/
      #                           lib2to3 references anywhere in windows_player/).
      # rthook + --add-binary mpv.exe;. unchanged: in onedir, _MEIPASS is the
      # _internal\ dir, the hook prepends it to PATH, mpv.exe is found there.
      - name: Build onedir bundle with PyInstaller (UPX + excludes)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $upxDir = Split-Path (Get-Command upx).Source
          pyinstaller `
            --onedir `
            --noconsole `
            --name lan-media-wall-player `
            --paths windows_player `
            --runtime-hook .github/pyinstaller/rthook_mpv.py `
            --add-binary "mpv_runtime/mpv.exe;." `
            --add-data "windows_player/config.example.yaml;." `
            --add-data "remote_flutter/pubspec.yaml;." `
            --upx-dir "$upxDir" `
            --upx-exclude "mpv.exe" `
            --exclude-module tkinter `
            --exclude-module unittest `
            --exclude-module test `
            --exclude-module pydoc `
            --exclude-module lib2to3 `
            --exclude-module pdb `
            --exclude-module doctest `
            --hidden-import websockets `
            --hidden-import websockets.legacy `
            --hidden-import websockets.legacy.client `
            --hidden-import requests `
            --hidden-import yaml `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import psutil `
            --hidden-import win32gui `
            --hidden-import win32con `
            windows_player/main.py

      - name: Sanity-check the onedir output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Test-Path "dist/lan-media-wall-player/lan-media-wall-player.exe")) {
            throw "expected dist/lan-media-wall-player/lan-media-wall-player.exe was not produced"
          }
          if (-not (Test-Path "dist/lan-media-wall-player/_internal/mpv.exe")) {
            throw "mpv.exe not co-bundled into _internal/ — runtime hook would fail to find it"
          }
          $bundleBytes = (Get-ChildItem "dist/lan-media-wall-player" -Recurse |
                          Measure-Object -Property Length -Sum).Sum
          Write-Host ("onedir bundle total: {0:N1} MB" -f ($bundleBytes / 1MB))

      # --- Wrap the onedir bundle into an install wizard ------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $src = (Resolve-Path "dist/lan-media-wall-player").Path
          New-Item -ItemType Directory -Force -Path "installer_out" | Out-Null
          $out = (Resolve-Path "installer_out").Path
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMySourceDir=$src" "/DMyOutputDir=$out" ".github/pyinstaller/installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Measure + verify installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = "installer_out/lan-media-wall-player-setup.exe"
          if (-not (Test-Path $setup)) { throw "installer not produced at $setup" }
          $mb = (Get-Item $setup).Length / 1MB
          Write-Host ("installer size: {0:N1} MB (was 60.6 MB onefile)" -f $mb)
          Get-Item $setup | Format-List Name,Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-media-wall-player-windows-setup
          path: installer_out/lan-media-wall-player-setup.exe
          if-no-files-found: error
